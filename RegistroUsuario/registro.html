<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - ¿Qué hay de nuevo, Nuevo León?</title>
    <link rel="stylesheet" href="registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <main class="login-wrapper">
        <div class="login-aside">
            <div class="aside-content">
                <h1>¿QUÉ HAY DE NUEVO,<br><span>NUEVO LEÓN?</span></h1>
            </div>
        </div>

        <div class="login-section">
            <div class="login-box">
                <div class="brand-logo">
                    <i class="fas fa-futbol"></i>
                </div>

                <div class="login-header">
                    <h2>¡Crea tu cuenta!</h2>
                </div>

                <form class="login-form" id="registerForm">
                    <div class="input-group">
                        <label for="name"><i class="fas fa-user"></i> Nombre completo</label>
                        <input type="text" id="name" placeholder="Tu nombre" required>
                    </div>
                    <div class="input-group">
                        <label for="age"><i class="fas fa-calendar-day"></i> Edad</label>
                        <input type="number" id="age" placeholder="Ej. 20" min="13" required>
                    </div>
                    <div class="input-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password"><i class="fas fa-lock"></i> Confirmar contraseña</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-id-card"></i> Tipo de perfil</label>
                        <div class="profile-type-selector">
                            <button type="button" class="type-option active" data-value="personal" onclick="selectTipo(this)">
                                <i class="fas fa-user"></i>
                                <span>Personal</span>
                            </button>
                            <button type="button" class="type-option" data-value="negocio" onclick="selectTipo(this)">
                                <i class="fas fa-store"></i>
                                <span>Negocio</span>
                            </button>
                        </div>
                        <input type="hidden" id="tipoPerfil" value="personal">
                    </div>

                    <p id="registerError"  style="color:#e74c3c;font-size:0.85rem;display:none;margin-bottom:8px;"></p>
                    <p id="registerSuccess" style="color:#27ae60;font-size:0.85rem;display:none;margin-bottom:8px;"></p>

                    <button type="submit" class="btn-login" id="btnRegister">Registrarse</button>
                </form>

                <script>
                    function selectTipo(btn) {
                        document.querySelectorAll('.type-option').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById('tipoPerfil').value = btn.dataset.value;
                    }

                    document.getElementById('registerForm').addEventListener('submit', async function(e) {
                        e.preventDefault();

                        const nombre          = document.getElementById('name').value.trim();
                        const edad            = document.getElementById('age').value;
                        const email           = document.getElementById('email').value.trim();
                        const password        = document.getElementById('password').value;
                        const confirmPassword = document.getElementById('confirm-password').value;
                        const tipo_perfil     = document.getElementById('tipoPerfil').value;
                        const errorEl         = document.getElementById('registerError');
                        const successEl       = document.getElementById('registerSuccess');
                        const btnRegister     = document.getElementById('btnRegister');

                        errorEl.style.display   = 'none';
                        successEl.style.display = 'none';

                        if (password !== confirmPassword) {
                            errorEl.textContent = 'Las contraseñas no coinciden.';
                            errorEl.style.display = 'block';
                            return;
                        }

                        btnRegister.disabled = true;
                        btnRegister.textContent = 'Registrando...';

                        try {
                            const res = await fetch('http://localhost:3000/api/auth/register', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ nombre, edad, correo: email, password, tipo_perfil })
                            });

                            const data = await res.json();

                            if (!res.ok) {
                                errorEl.textContent = data.error || 'Error al registrarse.';
                                errorEl.style.display = 'block';
                                return;
                            }

                            successEl.textContent = '¡Cuenta creada! Redirigiendo al login...';
                            successEl.style.display = 'block';
                            setTimeout(() => window.location.href = '../Login/login.html', 2000);

                        } catch (err) {
                            errorEl.textContent = 'No se pudo conectar con el servidor.';
                            errorEl.style.display = 'block';
                        } finally {
                            btnRegister.disabled = false;
                            btnRegister.textContent = 'Registrarse';
                        }
                    });
                </script>

                <div class="toggle-box">
                    <p>¿Ya tienes cuenta? <a href="../Login/login.html">Inicia sesión</a></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
