<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"Roboto",sans-serif;background:#f0f2f5;color:#333;}

    /* HEADER */
    .main-header{background:#001f5b;padding:10px 0;position:fixed;width:100%;top:0;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.3);}
    .header-container{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;}
    .logo-img{height:50px;border-radius:8px;}
    .search-area input{width:340px;padding:10px 15px;border-radius:5px;border:none;font-size:14px;outline:none;}
    .nav-links{display:flex;gap:20px;align-items:center;flex-shrink:0;}
    .nav-links a{text-decoration:none;color:#fff;font-size:14px;display:flex;align-items:center;gap:8px;transition:opacity .2s;white-space:nowrap;}
    .nav-links a:hover{opacity:.8;}
    .nav-links .profile-btn{background:#ffc107;color:#001f5b;padding:8px 15px;border-radius:5px;font-weight:500;}

    /* PROFILE CONTAINER */
    .profile-wrap{max-width:960px;margin:80px auto 50px;padding:0 16px;}

    /* COVER + AVATAR CARD */
    .profile-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12);margin-bottom:24px;}
    .cover-section{position:relative;height:230px;}
    .cover-photo{width:100%;height:230px;object-fit:cover;display:block;}
    .cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 60%,rgba(0,0,31,.45));}
    .btn-edit-cover{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.88);border:none;color:#333;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s;}
    .btn-edit-cover:hover{background:#fff;}

    /* AVATAR */
    .avatar-wrap{position:absolute;bottom:-52px;left:36px;width:116px;height:116px;border-radius:50%;border:5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.2);z-index:2;}
    .avatar-img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
    .btn-edit-avatar{position:absolute;bottom:4px;right:4px;background:#ffc107;border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid #fff;transition:.2s;}
    .btn-edit-avatar:hover{background:#e0a800;}

    /* USER INFO */
    .user-info{padding:66px 36px 26px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;}
    .user-info h1{font-size:24px;font-weight:700;color:#001f5b;margin-bottom:4px;}
    .user-meta{font-size:13px;color:#777;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px;}
    .user-meta span{display:flex;align-items:center;gap:5px;}
    .user-bio-text{font-size:14px;color:#555;line-height:1.6;max-width:560px;}
    .user-bio-text.empty{color:#aaa;font-style:italic;}
    .btn-edit-profile{background:#001f5b;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;transition:.2s;white-space:nowrap;flex-shrink:0;}
    .btn-edit-profile:hover{background:#00133a;}

    /* STATS */
    .stats-bar{border-top:1px solid #eee;padding:18px 36px;display:flex;gap:36px;}
    .stat-item{display:flex;flex-direction:column;align-items:center;}
    .stat-num{font-size:22px;font-weight:700;color:#ffc107;}
    .stat-lbl{font-size:12px;color:#777;margin-top:2px;}

    /* POSTS SECTION */
    .posts-section{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);padding:28px;}
    .posts-section h2{font-size:17px;font-weight:700;color:#001f5b;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
    .posts-section h2 i{color:#ffc107;}
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
    .post-card{border-radius:12px;overflow:hidden;background:#f8f9fa;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s;}
    .post-card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.14);}
    .post-card a{text-decoration:none;color:inherit;}
    .card-img-wrap{position:relative;height:170px;overflow:hidden;}
    .card-img-wrap img{width:100%;height:100%;object-fit:cover;}
    .cat-badge{position:absolute;top:10px;left:10px;background:#ffc107;color:#001f5b;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
    .card-body{padding:14px;}
    .card-body h3{font-size:14px;font-weight:600;color:#001f5b;margin-bottom:6px;line-height:1.4;}
    .card-footer-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#888;margin-top:8px;}
    .card-footer-row span{display:flex;align-items:center;gap:4px;}
    .card-footer-row i{color:#ffc107;}
    .no-posts{grid-column:1/-1;text-align:center;padding:40px;color:#aaa;font-size:14px;}

    /* ─── EDIT MODAL ─── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:2000;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:#fff;border-radius:16px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
    .modal-header{background:#001f5b;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;border-radius:16px 16px 0 0;}
    .modal-header h3{color:#fff;font-size:17px;font-weight:700;}
    .btn-close-modal{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.8;transition:.2s;}
    .btn-close-modal:hover{opacity:1;}
    .modal-body{padding:24px;display:flex;flex-direction:column;gap:18px;}
    .field-group label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:7px;}
    .field-group input,.field-group textarea{width:100%;padding:11px 14px;border:1.5px solid #dde;border-radius:8px;font-size:14px;font-family:"Roboto",sans-serif;outline:none;transition:border-color .2s;}
    .field-group input:focus,.field-group textarea:focus{border-color:#001f5b;}
    .field-group textarea{resize:none;height:80px;}
    .photo-upload-row{display:flex;gap:14px;align-items:flex-start;}
    .upload-btn-wrap{flex:1;}
    .upload-btn-wrap label{display:flex;align-items:center;gap:8px;background:#f0f2f5;border:1.5px dashed #ccc;border-radius:8px;padding:12px;font-size:13px;color:#555;cursor:pointer;transition:.2s;}
    .upload-btn-wrap label:hover{border-color:#001f5b;color:#001f5b;}
    .upload-btn-wrap input{display:none;}
    .photo-preview{width:64px;height:64px;border-radius:8px;object-fit:cover;display:none;border:2px solid #ffc107;}
    .modal-footer-btns{display:flex;gap:12px;justify-content:flex-end;padding:0 24px 24px;}
    .btn-cancel{background:#f0f2f5;border:none;color:#555;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:14px;transition:.2s;}
    .btn-cancel:hover{background:#e0e3e8;}
    .btn-save{background:#ffc107;color:#001f5b;border:none;padding:10px 26px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;transition:.2s;}
    .btn-save:hover{background:#e0a800;}
    .save-error{color:#e74c3c;font-size:12px;text-align:center;padding:0 24px 8px;display:none;}
  </style>
</head>
<body>

<header class="main-header">
  <div class="header-container">
    <div class="logo-area"><img src="../Recursos/logo.png" alt="Logo" class="logo-img"/></div>
    <div class="search-area"><input type="text" placeholder="Buscar publicaciones..."/></div>
    <nav class="nav-links" id="mainNav">
      <a href="../index.html"><i class="fas fa-home"></i> Inicio</a>
      <a href="../index.html"><i class="fas fa-plus"></i> Publicar</a>
      <a href="Perfil.html" class="profile-btn"><i class="fas fa-user"></i> Perfil</a>
      <!-- Enlaces dinámicos -->
      <a href="../PanelAdministracion/admin.html" id="linkAdmin" style="display:none; background:#dc2626; color:white; padding:8px 15px; border-radius:5px;"><i class="fas fa-user-shield"></i> Administración</a>
      <a href="../PanelModeracion/moderacion.html" id="linkMod" style="display:none; background:#0284c7; color:white; padding:8px 15px; border-radius:5px;"><i class="fas fa-shield-alt"></i> Moderación</a>
      
      <a href="../Login/login.html" id="btnCerrarSesion"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
    </nav>
  </div>
</header>

<div class="profile-wrap">

  <!-- PROFILE CARD -->
  <div class="profile-card">
    <div class="cover-section">
      <img id="coverImg" src="../Recursos/BK.jpg" alt="Portada" class="cover-photo"/>
      <div class="cover-overlay"></div>
      <button class="btn-edit-cover" title="Cambiar portada" onclick="openEditModal()"><i class="fas fa-camera"></i></button>
      <div class="avatar-wrap">
        <img id="avatarImg" src="../Recursos/perfil.jpg" alt="Avatar" class="avatar-img"/>
        <button class="btn-edit-avatar" title="Cambiar foto" onclick="openEditModal()"><i class="fas fa-camera"></i></button>
      </div>
    </div>

    <div class="user-info">
      <div>
        <h1 id="uNombre">Cargando...</h1>
        <div class="user-meta">
          <span><i class="fas fa-envelope"></i> <span id="uCorreo">—</span></span>
          <span><i class="fas fa-user-tag"></i> <span id="uRol">—</span></span>
          <span id="tipoBadge" style="display:inline-flex;align-items:center;gap:5px;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;background:#ffc107;color:#001f5b;letter-spacing:.4px;">
            <i id="tipoBadgeIcon" class="fas fa-user"></i> <span id="uTipoPerfil">Personal</span>
          </span>
        </div>
        <p id="uBio" class="user-bio-text empty">Sin descripción aún.</p>
      </div>
      <button class="btn-edit-profile" onclick="openEditModal()"><i class="fas fa-pen"></i> Editar perfil</button>
    </div>

    <div class="stats-bar">
      <div class="stat-item"><span class="stat-num" id="sPubs">—</span><span class="stat-lbl">Publicaciones</span></div>
      <div class="stat-item"><span class="stat-num" id="sLikes">—</span><span class="stat-lbl">Likes totales</span></div>
    </div>
  </div>

  <!-- USER POSTS -->
  <div class="posts-section">
    <h2><i class="fas fa-images"></i> Mis Publicaciones</h2>
    <div class="posts-grid" id="postsGrid">
      <p class="no-posts"><i class="fas fa-spinner fa-spin"></i> Cargando publicaciones...</p>
    </div>
  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3><i class="fas fa-pen"></i> Editar Perfil</h3>
      <button class="btn-close-modal" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label>Nombre completo *</label>
        <input type="text" id="editNombre" maxlength="100" placeholder="Tu nombre..."/>
      </div>
      <div class="field-group">
        <label>Descripción / Bio</label>
        <textarea id="editBio" maxlength="500" placeholder="Cuéntale algo al mundo sobre ti..."></textarea>
      </div>
      <div class="field-group">
        <label><i class="fas fa-user-circle" style="color:#ffc107;margin-right:5px;"></i>Foto de perfil</label>
        <div class="photo-upload-row">
          <div class="upload-btn-wrap">
            <label><i class="fas fa-upload"></i> Seleccionar imagen<input type="file" id="inputFotoPerfil" accept="image/*"/></label>
          </div>
          <img id="previewPerfil" class="photo-preview" alt="Preview perfil"/>
        </div>
      </div>
      <div class="field-group">
        <label><i class="fas fa-image" style="color:#ffc107;margin-right:5px;"></i>Foto de portada</label>
        <div class="photo-upload-row">
          <div class="upload-btn-wrap">
            <label><i class="fas fa-upload"></i> Seleccionar imagen<input type="file" id="inputFotoPortada" accept="image/*"/></label>
          </div>
          <img id="previewPortada" class="photo-preview" alt="Preview portada"/>
        </div>
      </div>
    </div>
    <p class="save-error" id="saveError"></p>
    <div class="modal-footer-btns">
      <button class="btn-cancel" onclick="closeEditModal()">Cancelar</button>
      <button class="btn-save" id="btnGuardar" onclick="guardarPerfil()"><i class="fas fa-check"></i> Guardar</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';
  const usuario = JSON.parse(sessionStorage.getItem('usuario') || 'null');
  if (!usuario) window.location.href = '../Login/login.html';

  // Mostrar links según el rol
  if (usuario.rol === 'administrador') {
    document.getElementById('linkAdmin').style.display = 'flex';
  } else if (usuario.rol === 'moderador') {
    document.getElementById('linkMod').style.display = 'flex';
  }

  document.getElementById('btnCerrarSesion')?.addEventListener('click', e => {
    e.preventDefault(); sessionStorage.removeItem('usuario'); window.location.href = '../Login/login.html';
  });

  // ── Resize helper ──
  function resizeImg(file, maxW=1200, maxH=700, q=0.8) {
    return new Promise(resolve => {
      const img = new Image(), url = URL.createObjectURL(file);
      img.onload = () => {
        const sc = Math.min(maxW/img.width, maxH/img.height, 1);
        const c = document.createElement('canvas');
        c.width = Math.round(img.width*sc); c.height = Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        URL.revokeObjectURL(url); resolve(c.toDataURL('image/jpeg', q));
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
      img.src = url;
    });
  }

  function timeAgo(d) {
    const s = (Date.now()-new Date(d))/1000;
    if(s<60)   return 'Hace un momento';
    if(s<3600) return `Hace ${Math.floor(s/60)} min`;
    if(s<86400)return `Hace ${Math.floor(s/3600)} h`;
    return new Date(d).toLocaleDateString('es-MX');
  }

  // ── Cargar datos de perfil ──
  async function cargarPerfil() {
    try {
      const d = await fetch(`${API}/api/users/${usuario.id}`).then(r=>r.json());

      document.getElementById('uNombre').textContent = d.nombre;
      document.getElementById('uCorreo').textContent = d.correo;
      document.getElementById('uRol').textContent    = d.rol;
      document.getElementById('sPubs').textContent   = d.num_publicaciones ?? 0;
      document.getElementById('sLikes').textContent  = d.total_likes ?? 0;

      const tipoPerfil = d.tipo_perfil || 'personal';
      const esNegocio = tipoPerfil === 'negocio';
      document.getElementById('uTipoPerfil').textContent = esNegocio ? 'Negocio' : 'Personal';
      document.getElementById('tipoBadgeIcon').className = esNegocio ? 'fas fa-store' : 'fas fa-user';
      document.getElementById('tipoBadge').style.background = esNegocio ? '#0284c7' : '#ffc107';
      document.getElementById('tipoBadge').style.color = esNegocio ? '#fff' : '#001f5b';

      const bioEl = document.getElementById('uBio');
      if (d.descripcion) { bioEl.textContent = d.descripcion; bioEl.classList.remove('empty'); }

      if (d.foto_perfil)  document.getElementById('avatarImg').src  = d.foto_perfil;
      if (d.foto_portada) document.getElementById('coverImg').src   = d.foto_portada;

      // Guardar en sesión local para edición
      window._perfilData = d;
    } catch(e) { console.error(e); }
  }

  // ── Cargar publicaciones ──
  async function cargarPosts() {
    const grid = document.getElementById('postsGrid');
    try {
      const posts = await fetch(`${API}/api/users/${usuario.id}/posts`).then(r=>r.json());
      if (!Array.isArray(posts) || !posts.length) {
        grid.innerHTML = '<p class="no-posts"><i class="fas fa-camera-retro"></i><br>Aún no tienes publicaciones.<br><a href="../index.html" style="color:#001f5b;font-weight:600;">¡Crea la primera!</a></p>';
        return;
      }
      grid.innerHTML = posts.map(p => `
        <div class="post-card">
          <a href="../Post/Post.html?id=${p.id_publicacion}">
            <div class="card-img-wrap">
              <img src="${p.imagen || '../Recursos/tacos.jpg'}" alt="${p.titulo}" onerror="this.src='../Recursos/tacos.jpg'"/>
              <span class="cat-badge">${p.categoria || 'General'}</span>
            </div>
            <div class="card-body">
              <h3>${p.titulo}</h3>
              <div class="card-footer-row">
                <span><i class="fas fa-heart"></i> ${p.likes}</span>
                <span><i class="fas fa-comment"></i> ${p.num_comentarios}</span>
                <span><i class="fas fa-clock"></i> ${timeAgo(p.fecha_creacion)}</span>
              </div>
            </div>
          </a>
        </div>`).join('');
    } catch(e) {
      grid.innerHTML = '<p class="no-posts" style="color:#e74c3c;">Error al cargar publicaciones.</p>';
    }
  }

  // ── Modal ──
  let newFotoPerfil = null, newFotoPortada = null;

  function openEditModal() {
    const d = window._perfilData || {};
    document.getElementById('editNombre').value = d.nombre || usuario.nombre || '';
    document.getElementById('editBio').value    = d.descripcion || '';
    document.getElementById('previewPerfil').style.display  = 'none';
    document.getElementById('previewPortada').style.display = 'none';
    document.getElementById('saveError').style.display = 'none';
    newFotoPerfil = null; newFotoPortada = null;
    document.getElementById('editModal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
  }

  document.getElementById('inputFotoPerfil').addEventListener('change', async function() {
    const f = this.files[0]; if (!f) return;
    const b64 = await resizeImg(f, 1000, 1000, 0.92);
    if (!b64) return;
    newFotoPerfil = b64;
    const prev = document.getElementById('previewPerfil');
    prev.src = b64; prev.style.display = 'block';
  });

  document.getElementById('inputFotoPortada').addEventListener('change', async function() {
    const f = this.files[0]; if (!f) return;
    const b64 = await resizeImg(f, 1920, 600, 0.92);
    if (!b64) return;
    newFotoPortada = b64;
    const prev = document.getElementById('previewPortada');
    prev.src = b64; prev.style.display = 'block';
  });

  async function guardarPerfil() {
    const nombre = document.getElementById('editNombre').value.trim();
    const errEl  = document.getElementById('saveError');
    errEl.style.display = 'none';
    if (!nombre) { errEl.textContent = 'El nombre es obligatorio.'; errEl.style.display = 'block'; return; }

    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
    try {
      const res = await fetch(`${API}/api/users/${usuario.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre,
          descripcion:  document.getElementById('editBio').value.trim() || null,
          foto_perfil:  newFotoPerfil  || null,
          foto_portada: newFotoPortada || null
        })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }

      // Actualizar sesión
      const sess = JSON.parse(sessionStorage.getItem('usuario'));
      sess.nombre = nombre;
      sessionStorage.setItem('usuario', JSON.stringify(sess));

      closeEditModal();
      await cargarPerfil();
    } catch(e) {
      errEl.textContent = 'No se pudo conectar con el servidor.';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check"></i> Guardar';
    }
  }

  // ── Click fuera del modal para cerrar ──
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  cargarPerfil();
  cargarPosts();
</script>
</body>
</html>
