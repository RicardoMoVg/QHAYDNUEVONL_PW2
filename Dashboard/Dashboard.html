<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantalla Inicio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="header-container">
        <div class="logo-area">
          <img src="../Recursos/logo.png" alt="Logo UANL" class="logo-img" />
        </div>

        <div class="search-area">
          <input type="text" placeholder="Buscar publicaciones..." />
        </div>

        <nav class="nav-links">
          <a href="../index.html" class="active"><i class="fas fa-home"></i> Inicio</a>
          <a href="../index.html"><i class="fas fa-plus"></i> Publicar</a>
          <a href="../Perfil/Perfil.html" class="profile-btn"><i class="fas fa-user"></i> Perfil</a>
          <a href="../Login/login.html"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
        </nav>
      </div>
    </header>

    <main class="dashboard-container">
      <div class="filter-bar">
        <div class="filter-pills">
          <button class="pill active">Todos</button>
          <button class="pill">Gastronomía</button>
          <button class="pill">Eventos</button>
          <button class="pill">Cultura</button>
          <button class="pill">Deportes</button>
        </div>
        <button class="filter-btn">
          <i class="fas fa-sliders-h"></i> Filtros
        </button>
      </div>

      <div class="posts-grid">
        <div class="post-card">
          <a href="../Post/Post.html" class="post-card-link">
            <div class="card-image-wrapper">
              <img
                src="Recursos/tacos.jpg"
                alt="Portada post 1"
                class="card-cover"
              />
              <span class="category-badge">Gastronomía</span>
            </div>
            <div class="card-content">
              <div class="location-author">
                <span
                  ><i class="fas fa-map-marker-alt"></i> Barrio Antiguo</span
                >
              </div>
              <h2>Los mejores tacos al pastor de Monterrey</h2>
              <div class="card-stats">
                <span><i class="fas fa-heart"></i> 234</span>
                <span><i class="fas fa-comment-alt"></i> 45</span>
              </div>

              <hr class="card-divider" />

              <div class="post-footer">
                <img
                  src="Recursos/perfil.jpg"
                  alt="Foto autor"
                  class="author-photo"
                />
                <div class="author-info">
                  <h4>Carlos Rodríguez</h4>
                  <span>Hace 2 horas</span>
                </div>
              </div>
            </div></a
          >
        </div>

        <div class="post-card">
          <a href="../Post/Post.html" class="post-card-link">
            <div class="card-image-wrapper">
              <img
              src="Recursos/portada.jpg"
              alt="Portada post 2"
              class="card-cover"
            />
            <span class="category-badge">Gastronomía</span>
          </div>
          <div class="card-content">
            <div class="location-author">
              <span
                ><i class="fas fa-map-marker-alt"></i> San Pedro Garza
                García</span
              >
            </div>
            <h2>Restaurantes gourmet con vista a la ciudad</h2>
            <div class="card-stats">
              <span><i class="fas fa-heart"></i> 345</span>
              <span><i class="fas fa-comment-alt"></i> 54</span>
            </div>

            <hr class="card-divider" />

            <div class="post-footer">
              <img
                src="Recursos/perfil.jpg"
                alt="Foto autor"
                class="author-photo"
              />
              <div class="author-info">
                <h4>Carlos Rodríguez</h4>
                <span>Hace 2 horas</span>
              </div>
            </div>
          </div>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
